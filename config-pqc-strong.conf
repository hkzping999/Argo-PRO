# ============================================================
# Argo-PQC Strong 非交互安装配置 / Non-interactive install config
# ============================================================
# Usage:
#   bash argox.sh -f config-pqc-strong.conf
# Quick mode (-l) ignores this file.
# ============================================================

# 语言 / Language: C = 中文, E = English, empty = default English
L=''

# 协议选择 / Protocol selection
# 默认强化模式 ALLOW_LEGACY_PROTOCOLS='n' 时，只允许 VLESS 家族协议：
#   b = VLESS + Reality Vision
#   d = VLESS + Reality gRPC
#   e = VLESS + WS              <-- 默认/最简/推荐
#   i = VLESS + XHTTP HTTP/1.1 CDN
#   j = VLESS + XHTTP HTTP/3 Direct
#   m = VLESS + HTTPUpgrade CDN
# 临时 trycloudflare 隧道会自动收敛到 e = VLESS + WS；显式选择 b/d/m 时会保留 Reality/HTTPUpgrade。
INSTALL_PROTOCOLS='e'

# 是否允许旧兼容协议（VMess/Trojan/Shadowsocks/Hysteria2）
# n = 默认不安装旧协议；y = 可手动安装兼容协议
ALLOW_LEGACY_PROTOCOLS='n'

# VLESS 后量子混合加密 / VLESS Encryption PQC
ENABLE_VLESS_PQC='y'
VLESS_PQC_STRICT='y'
VLESS_PQC_REQUIRE_PREFIX='mlkem768x25519plus'

# 安全优先：默认禁用 0-RTT，将 vlessenc 输出规范化为 native.600s
VLESS_PQC_DISABLE_0RTT='y'
VLESS_PQC_RESUME='600s'

# 高级：可预置 xray vlessenc 生成的一对参数；一般留空自动生成
VLESS_PQC_DECRYPTION=''
VLESS_PQC_ENCRYPTION=''

# Argo Tunnel：留空 = 临时 trycloudflare；固定隧道填域名与 token/json/api token
ARGO_DOMAIN=''
ARGO_AUTH=''

# 端口
START_PORT=''
NGINX_PORT=''

# Reality / TLS 参数（仅在选择 Reality/Direct 类协议时使用）
# Reality 已独立于 TLS_SERVER：安装 Reality 时可手动输入；留空则从脚本预设域名池自动选择。
REALITY_PRIVATE=''
REALITY_TARGET=''          # 示例: www.microsoft.com:443；留空=安装时输入/自动选择
REALITY_SERVER_NAMES=''    # 示例: www.microsoft.com；留空=使用 REALITY_TARGET 的主机名
REALITY_CHECK_ON_INSTALL='y'
REALITY_CHECK_TIMEOUT='4'

# Reality ML-DSA-65 后量子签名；Xray-core 支持时自动生成 seed/verify，并在链接中追加 pqv=
ENABLE_REALITY_MLDSA65='y'
REALITY_MLDSA65_STRICT='n' # y=当前 Xray 不支持 mldsa65 时中止；n=自动回退为普通 Reality
REALITY_MLDSA65_SEED=''
REALITY_MLDSA65_VERIFY=''

# 普通 TLS/Hysteria2/Trojan Direct/XHTTP H3 的 SNI，不再控制 Reality
TLS_SERVER='addons.mozilla.org'

# TLS hybrid PQ curve，仅用于 security=tls，不用于 Reality
ENABLE_TLS_PQC_CURVE='y'
TLS_CURVE_PREFERENCES='X25519MLKEM768,X25519'

# Hysteria2 port hopping（默认不用）
PORT_HOPPING_RANGE=''

# WS/XHTTP 优选域名；留空使用脚本默认 CDN
SERVER=''

# Xray 通用参数
UUID=''
WS_PATH='argox'
NODE_NAME=''
SERVER_IP=''

# HTTPUpgrade CDN：作为 VLESS WS 的备用 CDN 传输，路径固定由 WS_PATH 派生为 /${WS_PATH}-hu
# 使用示例：INSTALL_PROTOCOLS='em' 同时部署 VLESS WS 与 VLESS HTTPUpgrade CDN。
